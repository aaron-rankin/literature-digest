# Research areas tracked by the literature-digest pipeline.
# Areas are auto-discovered from data/search_terms/<slug>/*.txt.  This file
# only stores thin metadata keyed by folder slug.

defaults:
  # Default LLM relevancy cutoff (0-100). Override per area with `threshold`.
  threshold: 60
  # How far back to look when polling free APIs (days). Matches the 2-week cadence
  # plus a small overlap window so late-indexed articles are not missed.
  lookback_days: 17
  # First-ever run window (days). Prevents an unbounded backfill when no
  # last_run cursor exists yet.
  first_run_lookback_days: 90

areas:
  - slug: data_science
    name: Data Science
    threshold: 55
  # nutrition / performance added when they get .txt queries
